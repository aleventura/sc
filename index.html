<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Tracks SoundCloud</title>
<style>
  :root{
    --bg:#0e0e10; --fg:#e9e9ec; --dim:#8a8a92; --card:#17171b;
    --border:#26262c; --acc:#f26f21; --acc2:#4ea1ff; --ok:#3ecf8e; --no:#e05a5a;
    --btn:#22222a; --btn-hover:#2c2c36;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--fg);
    font:15px/1.4 -apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',Roboto,sans-serif;
    -webkit-tap-highlight-color:transparent;overscroll-behavior:none}
  header{position:sticky;top:0;background:var(--bg);z-index:10;
    padding:env(safe-area-inset-top) 12px 8px;border-bottom:1px solid var(--border)}
  h1{font-size:16px;margin:6px 0 8px}
  .stats{font-size:12px;color:var(--dim);margin-bottom:8px}
  .filters{display:flex;gap:6px;overflow-x:auto;padding-bottom:6px;scrollbar-width:none}
  .filters::-webkit-scrollbar{display:none}
  .chip{flex:0 0 auto;padding:6px 10px;background:var(--btn);border:1px solid var(--border);
    border-radius:14px;color:var(--fg);font-size:13px;cursor:pointer;white-space:nowrap}
  .chip.active{background:var(--acc);border-color:var(--acc);color:#fff}
  .chip.sec{background:transparent}
  .chip.sec.active{background:var(--acc2);border-color:var(--acc2)}
  .list{padding:8px 10px 240px}
  .card{background:var(--card);border:1px solid var(--border);border-radius:12px;
    padding:10px 12px;margin-bottom:8px}
  .card.hidden{display:none}
  .title{font-size:15px;font-weight:600;margin:0 0 3px;line-height:1.3}
  .meta{display:flex;gap:10px;flex-wrap:wrap;font-size:12px;color:var(--dim);margin-bottom:6px}
  .meta .a{color:var(--fg)}
  .meta .dl{color:var(--acc)}
  .who{display:flex;gap:4px;align-items:center;flex-wrap:wrap;font-size:12px;margin-bottom:6px}
  .who .name{color:var(--fg);cursor:pointer;padding:2px 6px;background:var(--btn);
    border-radius:4px;border:1px solid transparent}
  .who .name:active{background:var(--btn-hover);border-color:var(--acc2)}
  .who .name.reposter{color:var(--acc2)}
  .who .sep{color:var(--dim);font-size:11px}
  .active-filters{display:flex;gap:6px;flex-wrap:wrap;padding:4px 10px;align-items:center}
  .active-filter{background:var(--acc2);color:#fff;font-size:12px;padding:4px 8px;
    border-radius:6px;display:inline-flex;gap:6px;align-items:center;cursor:pointer}
  .active-filter:active{opacity:.7}
  .search-row{display:flex;gap:6px;padding:6px 10px 0}
  .search-input{flex:1;background:var(--btn);border:1px solid var(--border);border-radius:8px;
    color:var(--fg);font-size:13px;padding:6px 8px;outline:none}
  .search-input:focus{border-color:var(--acc2)}
  .bulk-btn{background:var(--no);color:#fff;border:1px solid var(--no);border-radius:8px;
    padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;margin-left:auto}
  .bulk-btn:active{opacity:.7}
  .badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px}
  .badge{font-size:11px;padding:2px 6px;border-radius:6px;background:var(--btn);color:var(--dim)}
  .badge.state-g{background:rgba(62,207,142,.16);color:var(--ok)}
  .badge.state-x{background:rgba(224,90,90,.16);color:var(--no)}
  .actions{display:flex;gap:6px;margin-top:6px}
  .btn{flex:1;padding:8px 6px;background:var(--btn);border:1px solid var(--border);
    border-radius:8px;color:var(--fg);font-size:13px;cursor:pointer;font-weight:500}
  .btn:active{background:var(--btn-hover)}
  .btn.play{background:var(--acc);border-color:var(--acc);color:#fff}
  .btn.g.on{background:var(--ok);border-color:var(--ok);color:#0e0e10}
  .btn.x.on{background:var(--no);border-color:var(--no);color:#fff}
  .dl-link{color:var(--acc);text-decoration:none;font-size:12px}
  .dl-link:active{opacity:.7}
  .player{position:fixed;bottom:0;left:0;right:0;background:var(--card);
    border-top:1px solid var(--border);z-index:20;
    padding-bottom:env(safe-area-inset-bottom)}
  .player .now{padding:8px 12px;font-size:12px;color:var(--dim);
    display:flex;justify-content:space-between;align-items:center;gap:8px}
  .player .now strong{color:var(--fg);font-weight:600;white-space:nowrap;overflow:hidden;
    text-overflow:ellipsis;flex:1}
  .player .now .close{background:transparent;border:none;color:var(--dim);
    font-size:18px;cursor:pointer;padding:0 4px}
  .player iframe{width:100%;height:166px;border:0;display:block}
  .empty{padding:40px 20px;text-align:center;color:var(--dim)}
  .sync{font-size:11px;color:var(--dim);padding:4px 10px}
  .sync.err{color:var(--no)}
  .sync.ok{color:var(--ok)}
</style>
</head>
<body>
<header>
  <h1>🎧 Tracks SoundCloud</h1>
  <div class="stats" id="stats">Cargando…</div>
  <div class="filters" id="stateFilters">
    <button class="chip active" data-state="nuevos">✨ Nuevos</button>
    <button class="chip" data-state="guardados">❤ Guardados</button>
    <button class="chip" data-state="descartados">✕ Descartados</button>
  </div>
  <div class="filters" id="sortFilters">
    <button class="chip sec active" data-sort="fecha">Fecha ↓</button>
    <button class="chip sec" data-sort="reposts">Reposts ↓</button>
    <button class="chip sec" data-sort="comments">Comments ↓</button>
  </div>
  <div class="search-row">
    <input type="text" class="search-input" id="searchArtist" placeholder="🎤 Buscar artista..." autocomplete="off">
    <input type="text" class="search-input" id="searchAccount" placeholder="👤 Buscar cuenta..." autocomplete="off">
  </div>
  <div class="active-filters" id="activeFilters"></div>
  <div class="sync" id="sync"></div>
</header>

<div class="list" id="list"></div>

<div class="player" id="player" style="display:none">
  <div class="now">
    <strong id="nowPlaying">-</strong>
    <button class="close" id="closePlayer" aria-label="Cerrar">✕</button>
  </div>
  <iframe id="scPlayer" allow="autoplay" src="about:blank"></iframe>
</div>

<script>
// ============================================================
// CONFIG
// ============================================================
const TRACKS_URL = 'tracks.json?t=' + Date.now();
// URL del Apps Script deployment. Se pega despues del setup.
const SYNC_URL = 'https://script.google.com/macros/s/AKfycby3uI-6sm_Q6igc4jmebxi9xz5s_DDWuidx1EIGWuAtRAUH0_hgx0p-EHK5g9lYSylJ/exec';
const LS = 'sc_tracks_state_v1';

// ============================================================
// STATE
// ============================================================
let TRACKS = [];
let st = JSON.parse(localStorage.getItem(LS) || '{}');
// st = { <trackId>: 'g' | 'x' }

let filterState = 'nuevos';
let filterArtist = null;   // nombre exacto o null
let filterAccount = null;  // nombre exacto o null
let sortBy = 'fecha';

// ============================================================
// SYNC (localStorage -> Apps Script -> Google Sheet)
// ============================================================
let pushTimer = null;
function schedulePush(){
  clearTimeout(pushTimer);
  pushTimer = setTimeout(pushState, 800);
}

function pushState(){
  if (SYNC_URL.startsWith('REPLACE')) return; // no configurado
  try {
    fetch(SYNC_URL, {
      method: 'POST',
      mode: 'no-cors',
      body: new URLSearchParams({ data: JSON.stringify(st) })
    });
    setSync('ok', 'Sync ' + new Date().toLocaleTimeString());
  } catch(e) {
    setSync('err', 'Error sync: ' + e.message);
  }
}

function pullState(){
  if (SYNC_URL.startsWith('REPLACE')) return;
  fetch(SYNC_URL)
    .then(r => r.json())
    .then(data => {
      if (data && typeof data === 'object') {
        st = data;
        localStorage.setItem(LS, JSON.stringify(st));
        if (typeof render === 'function') render();
      }
    })
    .catch(() => {});
}

function save(){
  localStorage.setItem(LS, JSON.stringify(st));
  schedulePush();
}

function setSync(kind, msg){
  const el = document.getElementById('sync');
  el.className = 'sync ' + kind;
  el.textContent = msg;
}

// ============================================================
// STATE HELPERS
// ============================================================
function getState(id){ return st[id] || null; }
function setState(id, s){
  if (getState(id) === s) {
    delete st[id]; // toggle off
  } else {
    st[id] = s;
  }
  save();
  render();
}

// ============================================================
// FILTER + SORT
// ============================================================
function passesFilter(t){
  const s = getState(t.id);
  if (filterState === 'nuevos' && s) return false;
  if (filterState === 'guardados' && s !== 'g') return false;
  if (filterState === 'descartados' && s !== 'x') return false;
  // todos: pasa

  if (filterArtist && !(t.a || '').toLowerCase().includes(filterArtist.toLowerCase())) return false;
  if (filterAccount && !(t.cta || '').toLowerCase().includes(filterAccount.toLowerCase())) return false;
  return true;
}

function sortFn(a, b){
  if (sortBy === 'reposts') return (b.r || 0) - (a.r || 0);
  if (sortBy === 'comments') return (b.c || 0) - (a.c || 0);
  // fecha desc por default
  return (b.d || '').localeCompare(a.d || '');
}

// ============================================================
// RENDER
// ============================================================
function render(){
  const list = document.getElementById('list');
  const filtered = TRACKS.filter(passesFilter).sort(sortFn);

  if (!filtered.length) {
    list.innerHTML = '<div class="empty">Sin tracks para este filtro.</div>';
  } else {
    list.innerHTML = filtered.map(cardHTML).join('');
    list.querySelectorAll('[data-play]').forEach(el => {
      el.addEventListener('click', () => playTrack(el.dataset.play));
    });
    list.querySelectorAll('[data-mark]').forEach(el => {
      el.addEventListener('click', () => {
        const [id, s] = el.dataset.mark.split('|');
        setState(id, s);
      });
    });
    list.querySelectorAll('[data-artist]').forEach(el => {
      el.addEventListener('click', () => {
        filterArtist = el.dataset.artist;
        document.getElementById('searchArtist').value = filterArtist;
        render();
      });
    });
    list.querySelectorAll('[data-account]').forEach(el => {
      el.addEventListener('click', () => {
        filterAccount = el.dataset.account;
        document.getElementById('searchAccount').value = filterAccount;
        render();
      });
    });
  }

  // Filtros activos (artista/cuenta) — chips removibles + botón bulk-descartar
  const af = document.getElementById('activeFilters');
  const chips = [];
  if (filterArtist) {
    chips.push('<span class="active-filter" data-clear="artist">Artista: ' + esc(filterArtist) + ' ✕</span>');
  }
  if (filterAccount) {
    chips.push('<span class="active-filter" data-clear="account">Cuenta: ' + esc(filterAccount) + ' ✕</span>');
  }

  // Botón bulk-descartar: aparece si hay CUALQUIER filtro activo (para no descartar todo el catálogo por accidente)
  // Sin "Todos", filterState siempre es nuevos/guardados/descartados => siempre hay filtro de estado.
  // Mostrar el botón bulk solo si hay filtro adicional (artista/cuenta) para evitar descartar todos los "Nuevos" por accidente.
  const hasFilter = filterArtist || filterAccount;
  const notAlreadyDescartados = filterState !== 'descartados'; // no tiene sentido descartar los ya descartados
  if (hasFilter && notAlreadyDescartados && filtered.length > 0) {
    chips.push('<button class="bulk-btn" data-bulk="x">✕ Descartar ' + filtered.length + ' visibles</button>');
  }

  af.innerHTML = chips.join('');
  af.querySelectorAll('[data-clear]').forEach(el => {
    el.addEventListener('click', () => {
      if (el.dataset.clear === 'artist') {
        filterArtist = null;
        document.getElementById('searchArtist').value = '';
      }
      if (el.dataset.clear === 'account') {
        filterAccount = null;
        document.getElementById('searchAccount').value = '';
      }
      render();
    });
  });
  af.querySelectorAll('[data-bulk]').forEach(el => {
    el.addEventListener('click', () => {
      const n = filtered.length;
      if (!confirm('¿Marcar como Descartados los ' + n + ' tracks visibles? (esta acción se puede revertir uno por uno)')) return;
      filtered.forEach(t => { st[t.id] = 'x'; });
      save();
      render();
    });
  });

  // Stats: cantidad visible con el filtro actual + totales globales por estado
  const total = TRACKS.length;
  const nvos = TRACKS.filter(t => !getState(t.id)).length;
  const gs = TRACKS.filter(t => getState(t.id) === 'g').length;
  const xs = TRACKS.filter(t => getState(t.id) === 'x').length;
  document.getElementById('stats').textContent =
    filtered.length + ' / ' + total + ' tracks · Nuevos: ' + nvos + ' · ❤ ' + gs + ' · ✕ ' + xs;
}

function esc(s){
  return String(s || '').replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function cardHTML(t){
  const s = getState(t.id);
  const stateBadge = s === 'g' ? '<span class="badge state-g">❤ Guardado</span>'
    : s === 'x' ? '<span class="badge state-x">✕ Descartado</span>'
    : '';

  // Fila de quien: si REP y cuenta != artista, mostrar "Cuenta → Artista"
  const artist = t.a || '';
  const account = t.cta || '';
  const isRepost = (t.tipo === 'REP') && account && account.toLowerCase() !== artist.toLowerCase();

  let whoHTML = '';
  if (isRepost) {
    whoHTML = `
      <div class="who">
        <span class="name reposter" data-account="${esc(account)}">${esc(account)}</span>
        <span class="sep">reposteó →</span>
        <span class="name" data-artist="${esc(artist)}">${esc(artist)}</span>
      </div>`;
  } else if (artist) {
    whoHTML = `
      <div class="who">
        <span class="name" data-artist="${esc(artist)}">${esc(artist)}</span>
      </div>`;
  }

  return `
    <div class="card">
      <div class="title">${esc(t.t)}</div>
      ${whoHTML}
      <div class="meta">
        <span>${esc(t.d)}</span>
        <span>♻ ${t.r || 0}</span>
        <span>💬 ${t.c || 0}</span>
        ${t.dur ? '<span>' + t.dur + 'min</span>' : ''}
        ${t.g && t.g !== '-' ? '<span>' + esc(t.g) + '</span>' : ''}
      </div>
      <div class="badges">
        ${stateBadge}
        ${t.dl && t.dl !== 'ninguna' ? '<span class="badge">' + esc(t.dl) + '</span>' : ''}
      </div>
      ${t.dlu ? '<a class="dl-link" href="' + esc(t.dlu) + '" target="_blank" rel="noopener">⬇ Link descarga</a>' : ''}
      <div class="actions">
        <button class="btn play" data-play="${esc(t.u)}">▶ Play</button>
        <button class="btn g ${s === 'g' ? 'on' : ''}" data-mark="${t.id}|g">❤</button>
        <button class="btn x ${s === 'x' ? 'on' : ''}" data-mark="${t.id}|x">✕</button>
      </div>
    </div>
  `;
}

// ============================================================
// PLAYER (SoundCloud widget)
// ============================================================
function playTrack(url){
  const player = document.getElementById('player');
  const iframe = document.getElementById('scPlayer');
  const now = document.getElementById('nowPlaying');

  const src = 'https://w.soundcloud.com/player/?url=' + encodeURIComponent(url)
    + '&auto_play=true&show_artwork=true&show_comments=false&visual=false';
  iframe.src = src;
  now.textContent = url.replace(/^https?:\/\/(www\.)?soundcloud\.com\//, '');
  player.style.display = 'block';

  // MediaSession API para Lock Screen / AirPods
  if ('mediaSession' in navigator) {
    navigator.mediaSession.metadata = new MediaMetadata({
      title: now.textContent,
      artist: 'SoundCloud'
    });
  }
}

document.getElementById('closePlayer').addEventListener('click', () => {
  const iframe = document.getElementById('scPlayer');
  iframe.src = 'about:blank';
  document.getElementById('player').style.display = 'none';
});

// ============================================================
// EVENT LISTENERS
// ============================================================
document.getElementById('stateFilters').addEventListener('click', e => {
  if (e.target.tagName !== 'BUTTON') return;
  filterState = e.target.dataset.state;
  document.querySelectorAll('#stateFilters .chip').forEach(c => c.classList.remove('active'));
  e.target.classList.add('active');
  render();
});

document.getElementById('sortFilters').addEventListener('click', e => {
  if (e.target.tagName !== 'BUTTON') return;
  sortBy = e.target.dataset.sort;
  document.querySelectorAll('#sortFilters .chip').forEach(c => c.classList.remove('active'));
  e.target.classList.add('active');
  render();
});

// Inputs de busqueda con debounce corto
let searchDebounce = null;
function onSearch(){
  clearTimeout(searchDebounce);
  searchDebounce = setTimeout(() => {
    filterArtist = document.getElementById('searchArtist').value.trim() || null;
    filterAccount = document.getElementById('searchAccount').value.trim() || null;
    render();
  }, 150);
}
document.getElementById('searchArtist').addEventListener('input', onSearch);
document.getElementById('searchAccount').addEventListener('input', onSearch);

// ============================================================
// INIT
// ============================================================
fetch(TRACKS_URL)
  .then(r => r.json())
  .then(payload => {
    TRACKS = (payload && payload.t) ? payload.t : (Array.isArray(payload) ? payload : []);
    render();
    pullState(); // trae marcas del Sheet si hay
  })
  .catch(err => {
    document.getElementById('list').innerHTML =
      '<div class="empty">Error cargando tracks.json: ' + esc(err.message) + '</div>';
  });
</script>
</body>
</html>
