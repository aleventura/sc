<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Tracks SoundCloud</title>
<script src="https://w.soundcloud.com/player/api.js"></script>
<style>
  :root{
    --bg:#0e0e10; --fg:#e9e9ec; --dim:#8a8a92; --card:#17171b;
    --border:#26262c; --acc:#f26f21; --acc2:#4ea1ff; --ok:#3ecf8e; --no:#e05a5a;
    --btn:#22222a; --btn-hover:#2c2c36;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--fg);
    font:15px/1.4 -apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',Roboto,sans-serif;
    -webkit-tap-highlight-color:transparent;overscroll-behavior:none}
  header{position:sticky;top:0;background:var(--bg);z-index:10;
    padding:env(safe-area-inset-top) 12px 8px;border-bottom:1px solid var(--border)}
  h1{font-size:16px;margin:6px 0 8px}
  .stats{font-size:12px;color:var(--dim);margin-bottom:8px}
  .filters{display:flex;gap:6px;overflow-x:auto;padding-bottom:6px;scrollbar-width:none}
  .filters::-webkit-scrollbar{display:none}
  .chip{flex:0 0 auto;padding:6px 10px;background:var(--btn);border:1px solid var(--border);
    border-radius:14px;color:var(--fg);font-size:13px;cursor:pointer;white-space:nowrap}
  .chip.active{background:var(--acc);border-color:var(--acc);color:#fff}
  .chip.sec{background:transparent}
  .chip.sec.active{background:var(--acc2);border-color:var(--acc2)}
  .list{padding:8px 10px 40px}
  .card{background:var(--card);border:1px solid var(--border);border-radius:12px;
    padding:10px 12px;margin-bottom:8px}
  .card.hidden{display:none}
  .title{font-size:15px;font-weight:600;margin:0 0 3px;line-height:1.3}
  .meta{display:flex;gap:10px;flex-wrap:wrap;font-size:12px;color:var(--dim);margin-bottom:6px}
  .meta .a{color:var(--fg)}
  .meta .dl{color:var(--acc)}
  .who{display:flex;gap:4px;align-items:center;flex-wrap:wrap;font-size:12px;margin-bottom:6px}
  .who .name{color:var(--fg);cursor:pointer;padding:2px 6px;background:var(--btn);
    border-radius:4px;border:1px solid transparent}
  .who .name:active{background:var(--btn-hover);border-color:var(--acc2)}
  .who .name.reposter{color:var(--acc2)}
  .who .sep{color:var(--dim);font-size:11px}
  .active-filters{display:flex;gap:8px;flex-wrap:wrap;padding:6px 10px;align-items:center}
  .active-filter{background:var(--acc2);color:#fff;font-size:14px;padding:8px 12px;
    border-radius:8px;display:inline-flex;gap:8px;align-items:center;cursor:pointer;
    font-weight:600;line-height:1.2}
  .active-filter .clear-x{background:rgba(0,0,0,.25);border-radius:50%;width:22px;height:22px;
    display:inline-flex;align-items:center;justify-content:center;font-size:14px;
    font-weight:700;margin-left:2px}
  .active-filter:active{opacity:.7}
  .search-row{display:flex;gap:6px;padding:6px 10px 0}
  .search-input{flex:1 1 0;min-width:0;background:var(--btn);border:1px solid var(--border);
    border-radius:8px;color:var(--fg);font-size:13px;padding:6px 8px;outline:none;
    width:100%;-webkit-appearance:none}
  .search-input:focus{border-color:var(--acc2)}
  .bulk-btn{background:var(--no);color:#fff;border:1px solid var(--no);border-radius:8px;
    padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;margin-left:auto}
  .bulk-btn:active{opacity:.7}
  .badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px}
  .badge{font-size:11px;padding:2px 6px;border-radius:6px;background:var(--btn);color:var(--dim)}
  .badge.state-g{background:rgba(62,207,142,.16);color:var(--ok)}
  .badge.state-x{background:rgba(224,90,90,.16);color:var(--no)}
  .badge.dl-badge{background:var(--acc);color:#fff;text-decoration:none;cursor:pointer;
    padding:2px 8px;font-weight:600}
  .badge.dl-badge:active{opacity:.7}
  .badge.tipo{background:transparent;border:1px solid var(--border)}
  .actions{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
  .btn{flex:1;padding:8px 6px;background:var(--btn);border:1px solid var(--border);
    border-radius:8px;color:var(--fg);font-size:13px;cursor:pointer;font-weight:500}
  .btn:active{background:var(--btn-hover)}
  .btn.play{background:var(--acc);border-color:var(--acc);color:#fff}
  .btn.play.playing{background:var(--btn);border-color:var(--acc);color:var(--acc)}
  .btn.next{flex:0 0 auto;padding:8px 14px;background:var(--acc);border-color:var(--acc);color:#fff;font-weight:700}
  .btn.seek{flex:0 0 auto;padding:8px 10px;background:var(--btn);border-color:var(--acc);color:var(--acc);font-weight:600;font-size:12px;min-width:52px}
  .btn.g.on{background:var(--ok);border-color:var(--ok);color:#0e0e10}
  .btn.x.on{background:var(--no);border-color:var(--no);color:#fff}
  .inline-player{margin-top:8px;border-radius:8px;overflow:hidden}
  .inline-player iframe{width:100%;height:166px;border:0;display:block}
  .empty{padding:40px 20px;text-align:center;color:var(--dim)}
  .sync{font-size:11px;color:var(--dim);padding:4px 10px}
  .sync.err{color:var(--no)}
  .sync.ok{color:var(--ok)}
</style>
</head>
<body>
<header>
  <h1>🎧 Tracks SoundCloud</h1>
  <div class="stats" id="stats">Cargando…</div>
  <div class="filters" id="stateFilters">
    <button class="chip active" data-state="nuevos">✨ Nuevos</button>
    <button class="chip" data-state="guardados">❤ Guardados</button>
    <button class="chip" data-state="descartados">✕ Descartados</button>
  </div>
  <div class="filters" id="sortFilters">
    <button class="chip sec active" data-sort="fecha">Fecha ↓</button>
    <button class="chip sec" data-sort="reposts">Reposts ↓</button>
    <button class="chip sec" data-sort="comments">Comments ↓</button>
  </div>
  <div class="search-row">
    <input type="text" class="search-input" id="searchArtist" placeholder="🎤 Buscar artista..." autocomplete="off">
    <input type="text" class="search-input" id="searchAccount" placeholder="👤 Buscar cuenta..." autocomplete="off">
  </div>
  <div class="active-filters" id="activeFilters"></div>
  <div class="sync" id="sync"></div>
</header>

<div class="list" id="list"></div>

<script>
// ============================================================
// CONFIG
// ============================================================
const TRACKS_URL = 'tracks.json?t=' + Date.now();
// URL del Apps Script deployment. Se pega despues del setup.
const SYNC_URL = 'https://script.google.com/macros/s/AKfycby3uI-6sm_Q6igc4jmebxi9xz5s_DDWuidx1EIGWuAtRAUH0_hgx0p-EHK5g9lYSylJ/exec';
const LS = 'sc_tracks_state_v1';

// DEV_MODE: si es true, ignora tracks.json y usa DEV_TRACKS de abajo.
// Ponelo en false (o borra el bloque) cuando quieras usar el JSON real.
const DEV_MODE = false;
const DEV_TRACKS = [
  {
    id: "maccabihouse--daft-punk-hbfs-rafael-maccabi-edit",
    u: "https://soundcloud.com/maccabihouse/daft-punk-hbfs-rafael-maccabi-edit",
    t: "Daft Punk - HBFS (Rafael Maccabi Edit)",
    a: "Maccabi House",
    d: "2026-06-15",
    r: 3421, c: 187, l: 12450,
    g: "Indie Dance / Nu Disco",
    dur: 6.4,
    dl: "hypeddit",
    dlu: "https://hypeddit.com/maccabihouse/hbfsedit",

  },
  {
    id: "djchrisstussy--chris-stussy-desire-1",
    u: "https://soundcloud.com/djchrisstussy/chris-stussy-desire-1",
    t: "Desire",
    a: "Chris Stussy",

    r: 892, c: 45, l: 3210,

    dur: 5.8,
    dl: "bandcamp",
    dlu: "https://chrisstussy.bandcamp.com",
    cta: "djchrisstussy",
    tipo: "UP"
  },
  {
    id: "maccabihouse--congagabssedit",
    u: "https://soundcloud.com/maccabihouse/gloria-estefan-conga-gabss-maccabi-edit",
    t: "Gloria Estefan - Conga (Gabss Maccabi Edit)",
    a: "Maccabi House",
    d: "2026-06-08",
    r: 5820, c: 312, l: 18900,
    g: "House",
    dur: 4.9,
    dl: "hypeddit",
    dlu: "https://hypeddit.com/maccabihouse/congagabssedit",
    cta: "davo",
    tipo: "REP"
  },
  {
    id: "maccabihouse--crystalisededit",
    u: "https://soundcloud.com/maccabihouse/the-xx-crystalised-bletter-maccabi-edit",
    t: "The XX - Crystalised (Bletter Maccabi Edit)",
    a: "Maccabi House",
    d: "2026-06-05",
    r: 1234, c: 89, l: 6500,
    g: "Indie Dance",
    dur: 5.2,
    dl: "hypeddit",
    dlu: "https://hypeddit.com/maccabihouse/crystalisededit",
    cta: "wuki",
    tipo: "REP"
  },
  {
    id: "maccabihouse--sevennationarmyedit",
    u: "https://soundcloud.com/maccabihouse/the-white-strips-seven-nation-army-the-botanist-maccabi-edit",
    t: "The White Stripes - Seven Nation Army (The Botanist Maccabi Edit)",
    a: "Maccabi House",
    d: "2026-06-01",
    r: 2100, c: 156, l: 9800,
    g: "Indie Dance",
    dur: 6.1,
    dl: "hypeddit",
    dlu: "https://hypeddit.com/maccabihouse/sevennationarmyedit",
    cta: "davo",
    tipo: "REP"
  },
  {
    id: "maccabihouse--keepmovingkoedit",
    u: "https://soundcloud.com/maccabihouse/jungle-keep-moving-ko-maccabi-edit",
    t: "Jungle - Keep Moving (K.O Maccabi Edit)",
    a: "Maccabi House",
    d: "2026-05-28",
    r: 780, c: 34, l: 2900,
    g: "House",
    dur: 7.3,
    dl: "hypeddit",
    dlu: "https://hypeddit.com/maccabihouse/keepmovingkoedit",
    cta: "maccabihouse",
    tipo: "UP"
  }
];

// ============================================================
// STATE
// ============================================================
let TRACKS = [];
let st = JSON.parse(localStorage.getItem(LS) || '{}');
// st = { <trackId>: 'g' | 'x' }

let filterState = 'nuevos';
let filterArtist = null;   // nombre exacto o null
let filterAccount = null;  // nombre exacto o null
let sortBy = 'fecha';
let currentPlayingUrl = null;  // track cuyo widget está abierto (o null)
let filteredTracks = [];       // lista visible actual (para playNext)
let scWidget = null;           // instancia del Widget API

// ============================================================
// SYNC (localStorage -> Apps Script -> Google Sheet)
// ============================================================
let pushTimer = null;
function schedulePush(){
  clearTimeout(pushTimer);
  pushTimer = setTimeout(pushState, 800);
}

function pushState(){
  if (SYNC_URL.startsWith('REPLACE')) return; // no configurado
  if (DEV_MODE) { setSync('ok', 'DEV: push omitido'); return; }
  try {
    fetch(SYNC_URL, {
      method: 'POST',
      mode: 'no-cors',
      body: new URLSearchParams({ data: JSON.stringify(st) })
    });
    setSync('ok', 'Sync ' + new Date().toLocaleTimeString());
  } catch(e) {
    setSync('err', 'Error sync: ' + e.message);
  }
}

function pullState(){
  if (SYNC_URL.startsWith('REPLACE')) return;
  if (DEV_MODE) return; // no traer marcas reales al testear
  fetch(SYNC_URL)
    .then(r => r.json())
    .then(data => {
      if (data && typeof data === 'object') {
        st = data;
        localStorage.setItem(LS, JSON.stringify(st));
        if (typeof render === 'function') render();
      }
    })
    .catch(() => {});
}

function save(){
  localStorage.setItem(LS, JSON.stringify(st));
  schedulePush();
}

function setSync(kind, msg){
  const el = document.getElementById('sync');
  el.className = 'sync ' + kind;
  el.textContent = msg;
}

// ============================================================
// STATE HELPERS
// ============================================================
function getState(id){ return st[id] || null; }
function setState(id, s){
  if (getState(id) === s) {
    delete st[id]; // toggle off
  } else {
    st[id] = s;
  }
  save();
  render();
}

// ============================================================
// FILTER + SORT
// ============================================================
function passesFilter(t){
  const s = getState(t.id);
  if (filterState === 'nuevos' && s) return false;
  if (filterState === 'guardados' && s !== 'g') return false;
  if (filterState === 'descartados' && s !== 'x') return false;
  // todos: pasa

  if (filterArtist && !(t.a || '').toLowerCase().includes(filterArtist.toLowerCase())) return false;
  if (filterAccount && !(t.cta || '').toLowerCase().includes(filterAccount.toLowerCase())) return false;
  return true;
}

function sortFn(a, b){
  if (sortBy === 'reposts') return (b.r || 0) - (a.r || 0);
  if (sortBy === 'comments') return (b.c || 0) - (a.c || 0);
  // fecha desc por default
  return (b.d || '').localeCompare(a.d || '');
}

// ============================================================
// RENDER
// ============================================================
function render(){
  const list = document.getElementById('list');
  const filtered = TRACKS.filter(passesFilter).sort(sortFn);
  filteredTracks = filtered; // guardar para playNext

  if (!filtered.length) {
    list.innerHTML = '<div class="empty">Sin tracks para este filtro.</div>';
  } else {
    list.innerHTML = filtered.map(cardHTML).join('');
    list.querySelectorAll('[data-play]').forEach(el => {
      el.addEventListener('click', () => playTrack(el.dataset.play));
    });
    list.querySelectorAll('[data-next]').forEach(el => {
      el.addEventListener('click', () => playNext());
    });
    list.querySelectorAll('[data-seek]').forEach(el => {
      el.addEventListener('click', () => seekToSecond(parseInt(el.dataset.seek, 10)));
    });
    list.querySelectorAll('[data-mark]').forEach(el => {
      el.addEventListener('click', () => {
        const [id, s] = el.dataset.mark.split('|');
        setState(id, s);
      });
    });
    list.querySelectorAll('[data-artist]').forEach(el => {
      el.addEventListener('click', () => {
        filterArtist = el.dataset.artist;
        document.getElementById('searchArtist').value = filterArtist;
        render();
      });
    });
    list.querySelectorAll('[data-account]').forEach(el => {
      el.addEventListener('click', () => {
        filterAccount = el.dataset.account;
        document.getElementById('searchAccount').value = filterAccount;
        render();
      });
    });

    // Enganchar Widget API al iframe activo (si existe)
    const iframe = document.getElementById('scWidget');
    if (iframe && window.SC && window.SC.Widget) {
      scWidget = window.SC.Widget(iframe);
      scWidget.bind(window.SC.Widget.Events.READY, () => {
        // Forzar play (el auto_play del URL a veces es bloqueado por Safari)
        scWidget.play();
      });
      scWidget.bind(window.SC.Widget.Events.FINISH, () => {
        playNext();
      });
    }
  }

  // Filtros activos (artista/cuenta) — chips removibles + botón bulk-descartar
  const af = document.getElementById('activeFilters');
  const chips = [];
  if (filterArtist) {
    chips.push('<span class="active-filter" data-clear="artist">Artista: ' + esc(filterArtist) + '<span class="clear-x">✕</span></span>');
  }
  if (filterAccount) {
    chips.push('<span class="active-filter" data-clear="account">Cuenta: ' + esc(filterAccount) + '<span class="clear-x">✕</span></span>');
  }

  // Botón bulk-descartar: aparece si hay CUALQUIER filtro activo (para no descartar todo el catálogo por accidente)
  // Sin "Todos", filterState siempre es nuevos/guardados/descartados => siempre hay filtro de estado.
  // Mostrar el botón bulk solo si hay filtro adicional (artista/cuenta) para evitar descartar todos los "Nuevos" por accidente.
  const hasFilter = filterArtist || filterAccount;
  const notAlreadyDescartados = filterState !== 'descartados'; // no tiene sentido descartar los ya descartados
  if (hasFilter && notAlreadyDescartados && filtered.length > 0) {
    chips.push('<button class="bulk-btn" data-bulk="x">✕ Descartar ' + filtered.length + ' visibles</button>');
  }

  af.innerHTML = chips.join('');
  af.querySelectorAll('[data-clear]').forEach(el => {
    el.addEventListener('click', () => {
      if (el.dataset.clear === 'artist') {
        filterArtist = null;
        document.getElementById('searchArtist').value = '';
      }
      if (el.dataset.clear === 'account') {
        filterAccount = null;
        document.getElementById('searchAccount').value = '';
      }
      render();
    });
  });
  af.querySelectorAll('[data-bulk]').forEach(el => {
    el.addEventListener('click', () => {
      const n = filtered.length;
      const contextParts = [];
      if (filterArtist) contextParts.push('Artista: ' + filterArtist);
      if (filterAccount) contextParts.push('Cuenta: ' + filterAccount);
      const context = contextParts.length ? '\n\nFiltro activo:\n  ' + contextParts.join('\n  ') : '';
      const msg = '¿Descartar ' + n + ' tracks?' + context + '\n\nEsta acción se puede revertir uno por uno desde la vista "Descartados".';
      if (!confirm(msg)) return;
      filtered.forEach(t => { st[t.id] = 'x'; });
      save();
      render();
    });
  });

  // Stats: cantidad visible con el filtro actual + totales globales por estado
  const total = TRACKS.length;
  const nvos = TRACKS.filter(t => !getState(t.id)).length;
  const gs = TRACKS.filter(t => getState(t.id) === 'g').length;
  const xs = TRACKS.filter(t => getState(t.id) === 'x').length;
  document.getElementById('stats').textContent =
    filtered.length + ' / ' + total + ' tracks · Nuevos: ' + nvos + ' · ❤ ' + gs + ' · ✕ ' + xs;
}

function esc(s){
  return String(s || '').replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function cardHTML(t){
  const s = getState(t.id);
  const stateBadge = s === 'g' ? '<span class="badge state-g">❤ Guardado</span>'
    : s === 'x' ? '<span class="badge state-x">✕ Descartado</span>'
    : '';

  // Fila de quien
  const artist = t.a || '';
  const account = t.cta || '';
  const isRepost = (t.tipo === 'REP') && account && account.toLowerCase() !== artist.toLowerCase();

  let whoHTML = '';
  if (isRepost) {
    whoHTML = `
      <div class="who">
        <span class="name reposter" data-account="${esc(account)}">${esc(account)}</span>
        <span class="sep">reposteó →</span>
        <span class="name" data-artist="${esc(artist)}">${esc(artist)}</span>
      </div>`;
  } else if (artist) {
    whoHTML = `
      <div class="who">
        <span class="name" data-artist="${esc(artist)}">${esc(artist)}</span>
      </div>`;
  }

  // Badge de descarga (clickeable si hay link)
  let dlBadge = '';
  if (t.dl && t.dl !== 'ninguna') {
    if (t.dlu) {
      dlBadge = '<a class="badge dl-badge" href="' + esc(t.dlu) + '" target="_blank" rel="noopener">⬇ ' + esc(t.dl) + '</a>';
    } else {
      dlBadge = '<span class="badge dl-badge">' + esc(t.dl) + '</span>';
    }
  }

  // Badge de tipo (UP/REP) informativo
  const tipoBadge = t.tipo ? '<span class="badge tipo">' + esc(t.tipo) + '</span>' : '';

  // Player inline si es el track activo
  const isPlaying = t.u === currentPlayingUrl;
  const playerHTML = isPlaying ? `
    <div class="inline-player">
      <iframe id="scWidget" src="https://w.soundcloud.com/player/?url=${encodeURIComponent(t.u)}&auto_play=true&show_artwork=true&show_comments=false&visual=false&buying=false&sharing=false&download=false" allow="autoplay"></iframe>
    </div>` : '';

  return `
    <div class="card">
      <div class="title">${esc(t.t)}</div>
      ${whoHTML}
      <div class="meta">
        <span>${esc(t.d)}</span>
        <span>♻ ${t.r || 0}</span>
        <span>💬 ${t.c || 0}</span>
        ${t.dur ? '<span>' + t.dur + 'min</span>' : ''}
        ${t.g && t.g !== '-' ? '<span>' + esc(t.g) + '</span>' : ''}
        ${dlBadge}
        ${tipoBadge}
      </div>
      ${stateBadge ? '<div class="badges">' + stateBadge + '</div>' : ''}
      <div class="actions">
        <button class="btn play ${isPlaying ? 'playing' : ''}" data-play="${esc(t.u)}">${isPlaying ? '⏸' : '▶ Play'}</button>
        ${isPlaying ? '<button class="btn next" data-next="1">⏭</button>' : ''}
        ${isPlaying ? '<button class="btn seek" data-seek="30">0:30</button>' : ''}
        ${isPlaying ? '<button class="btn seek" data-seek="60">1:00</button>' : ''}
        ${isPlaying ? '<button class="btn seek" data-seek="90">1:30</button>' : ''}
        ${isPlaying ? '<button class="btn seek" data-seek="120">2:00</button>' : ''}
        <button class="btn g ${s === 'g' ? 'on' : ''}" data-mark="${t.id}|g">❤</button>
        <button class="btn x ${s === 'x' ? 'on' : ''}" data-mark="${t.id}|x">✕</button>
      </div>
      ${playerHTML}
    </div>
  `;
}

// ============================================================
// PLAYER (SoundCloud widget inline dentro del card)
// ============================================================

function playTrack(url){
  if (currentPlayingUrl === url) {
    // Toggle off: cerrar player
    currentPlayingUrl = null;
    scWidget = null;
  } else {
    currentPlayingUrl = url;
    scWidget = null; // se re-atacha en render
    // MediaSession API para Lock Screen / AirPods / CarPlay
    if ('mediaSession' in navigator) {
      const track = TRACKS.find(t => t.u === url);
      const title = track ? track.t : url.replace(/^https?:\/\/(www\.)?soundcloud\.com\//, '');
      const artist = track ? track.a : 'SoundCloud';
      navigator.mediaSession.metadata = new MediaMetadata({
        title: title,
        artist: artist,
        album: 'SoundCloud'
      });
      // Handlers para botones nativos del auto/AirPods/Lock Screen.
      // Nota: pueden no funcionar en iOS Safari con iframe cross-origin,
      // pero seteados no hacen daño y en algunos contextos sí responden.
      try {
        navigator.mediaSession.setActionHandler('nexttrack', () => playNext());
        navigator.mediaSession.setActionHandler('previoustrack', () => playPrev());
        navigator.mediaSession.setActionHandler('seekforward', () => seekBy(30));
        navigator.mediaSession.setActionHandler('play', () => { if (scWidget) scWidget.play(); });
        navigator.mediaSession.setActionHandler('pause', () => { if (scWidget) scWidget.pause(); });
      } catch(e) { /* algunos handlers no soportados en ciertos browsers */ }
    }
  }
  render();
}

function playNext(){
  if (!currentPlayingUrl || !filteredTracks.length) return;
  const idx = filteredTracks.findIndex(t => t.u === currentPlayingUrl);
  if (idx === -1) {
    // El track actual no está en la vista filtrada; arrancar por el primero
    playTrack(filteredTracks[0].u);
    return;
  }
  const next = filteredTracks[idx + 1];
  if (!next) {
    // Fin de la lista
    currentPlayingUrl = null;
    scWidget = null;
    render();
    return;
  }
  playTrack(next.u);
}

function playPrev(){
  if (!currentPlayingUrl || !filteredTracks.length) return;
  const idx = filteredTracks.findIndex(t => t.u === currentPlayingUrl);
  if (idx <= 0) return; // no hay anterior o no encontrado
  playTrack(filteredTracks[idx - 1].u);
}

// Salta al segundo N del track (típicamente pasa la intro y va al drop)
function seekToSecond(seconds){
  if (scWidget) scWidget.seekTo(seconds * 1000); // ms
}

// Avanza N segundos desde la posición actual
function seekBy(seconds){
  if (!scWidget) return;
  scWidget.getPosition(pos => {
    scWidget.seekTo(pos + seconds * 1000);
  });
}

// ============================================================
// EVENT LISTENERS
// ============================================================
document.getElementById('stateFilters').addEventListener('click', e => {
  if (e.target.tagName !== 'BUTTON') return;
  filterState = e.target.dataset.state;
  document.querySelectorAll('#stateFilters .chip').forEach(c => c.classList.remove('active'));
  e.target.classList.add('active');
  render();
});

document.getElementById('sortFilters').addEventListener('click', e => {
  if (e.target.tagName !== 'BUTTON') return;
  sortBy = e.target.dataset.sort;
  document.querySelectorAll('#sortFilters .chip').forEach(c => c.classList.remove('active'));
  e.target.classList.add('active');
  render();
});

// Inputs de busqueda con debounce corto
let searchDebounce = null;
function onSearch(){
  clearTimeout(searchDebounce);
  searchDebounce = setTimeout(() => {
    filterArtist = document.getElementById('searchArtist').value.trim() || null;
    filterAccount = document.getElementById('searchAccount').value.trim() || null;
    render();
  }, 150);
}
document.getElementById('searchArtist').addEventListener('input', onSearch);
document.getElementById('searchAccount').addEventListener('input', onSearch);

// ============================================================
// INIT
// ============================================================
if (DEV_MODE) {
  TRACKS = DEV_TRACKS;
  render();
  pullState(); // trae marcas del Sheet si hay
  setSync('ok', 'DEV_MODE: usando tracks de ejemplo');
} else {
  fetch(TRACKS_URL)
    .then(r => r.json())
    .then(payload => {
      TRACKS = (payload && payload.t) ? payload.t : (Array.isArray(payload) ? payload : []);
      render();
      pullState(); // trae marcas del Sheet si hay
    })
    .catch(err => {
      document.getElementById('list').innerHTML =
        '<div class="empty">Error cargando tracks.json: ' + esc(err.message) + '</div>';
    });
}
